<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney XD Web | Oficial</title>
    <style>
        /* CONFIGURACIÓN DEL FONDO */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url('Fondo geométrico retro de neón.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* LOGO CON EFECTO DE FLOTAR */
        .logo-container img {
            width: 300px;
            filter: drop-shadow(0 0 15px #00FF00);
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* CONTENEDOR DE BOTONES */
        .menu {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        /* ESTILO DE BOTONES XD */
        .btn {
            background: #00FF00; /* Verde Neón */
            color: black;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 0 #008800;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #ffffff;
            box-shadow: 0 0 20px #00FF00;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0;
        }

        /* SECCIÓN DE JUEGOS (OCULTA POR DEFECTO) */
        #seccion-juegos {
            display: none;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #00FF00;
        }

        .lista-juegos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-juego {
            background: #8a2be2; /* Morado Jetix/XD */
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Logo de Disney XD en estilo retrofuturista.jpg" alt="Disney XD Logo">
    </div>

    <div class="menu">
        <a href="https://sites.google.com/view/disneyxdlatam/minecraft-1-18" class="btn">
            Empezar a ver Disney XD
        </a>

        <button class="btn" style="background: #ffffff;" onclick="mostrarJuegos()">
            🎮 Juegos
        </button>

        <div id="seccion-juegos">
            <div class="lista-juegos">
                <a href="#" class="btn-juego">Sonic X</a>
                <a href="#" class="btn-juego">Power Rangers</a>
                <a href="#" class="btn-juego">Pucca</a>
                <a href="#" class="btn-juego">Eaglercraft</a>
            </div>
            <button onclick="cerrarJuegos()" style="margin-top:10px; background:none; color:red; border:none; cursor:pointer;">[Cerrar]</button>
        </div>
    </div>

    <script>
        function mostrarJuegos() {
            document.getElementById('seccion-juegos').style.display = 'block';
        }
        function cerrarJuegos() {
            document.getElementById('seccion-juegos').style.display = 'none';
        }
    </script>

</body>
</html>
