<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney XD Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d1f3a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('Fondo geométrico retro de neón.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* LOGO VERDE NEÓN */
        .logo-xd {
            font-size: 70px;
            color: #00FF00;
            text-shadow: 0 0 15px #00FF00, 0 0 30px #00FF00;
            font-style: italic;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        .btn {
            background: #00FF00;
            color: black;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .btn:hover { background: white; transform: scale(1.05); }

        /* --- VENTANA DEL JUEGO (EL FRAME) --- */
        #game-window {
            display: none; /* Oculto al principio */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 85%;
            background: #000;
            border: 4px solid #00FF00;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
        }

        /* BOTÓN DE CERRAR VENTANA */
        #close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            background: red;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 101;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        /* LISTA DE BOTONES DE JUEGOS */
        #lista-juegos {
            display: none;
            margin-top: 15px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00FF00;
        }

        .btn-mini {
            display: block;
            background: #2b4f8a;
            color: white;
            padding: 8px;
            margin: 5px 0;
            text-decoration: none;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="logo-xd">DISNEY XD</div>

    <div class="menu">
        <a href="https://sites.google.com/view/disneyxdlatam/minecraft-1-18" class="btn">Ver Disney XD</a>
        
        <button class="btn" onclick="mostrarMenuJuegos()">🎮 Juegos</button>

        <div id="lista-juegos">
            <button class="btn-mini" onclick="abrirJuego('https://eaglercraft.com/mc/1.8.8')">Eaglercraft 1.8.8</button>
            <button class="btn-mini" onclick="abrirJuego('https://www.retrogames.cc/embed/40237-sonic-the-hedgehog-2-world.html')">Sonic Retro</button>
            <button class="btn-mini" onclick="abrirJuego('https://sites.google.com/site/unblockedgames77/power-rangers')">Power Rangers</button>
        </div>
    </div>

    <div id="game-window">
        <button id="close-btn" onclick="cerrarJuego()">X</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // Muestra u oculta la lista de botones
        function mostrarMenuJuegos() {
            let menu = document.getElementById('lista-juegos');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // Función para abrir el juego en la ventana
        function abrirJuego(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-window').style.display = 'block';
            document.getElementById('lista-juegos').style.display = 'none';
        }

        // Función para cerrar y detener el juego
        function cerrarJuego() {
            document.getElementById('game-window').style.display = 'none';
            document.getElementById('game-frame').src = ""; // Esto apaga el sonido del juego al cerrar
        }
    </script>

</body>
</html>
